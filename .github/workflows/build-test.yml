name: Build
on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.clang-format'
      - 'setup.iss'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.clang-format'
      - 'setup.iss'
      - '.github/ISSUE_TEMPLATE/**'
  release:
    types:
      - published
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache libcaesium
        id: cache-libcaesium
        uses: actions/cache@v4
        env:
          cache-name: cache-libcaesium
        with:
          path: ${{github.workspace}}/build-${{ runner.os }}/libcaesium-prefix
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/libcaesium.conf') }}

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          aqtversion: '==3.1.*'
          version: '6.8.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'
          modules: 'qtimageformats'
          tools: 'tools_mingw1310'
          cache: true

      - name: Install Rust target
        run: rustup target add x86_64-pc-windows-gnu

      - name: Configure CMake
        run: cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{env.Qt6_Dir}}" -G "CodeBlocks - MinGW Makefiles" -B ${{github.workspace}}/build-${{ runner.os }}

      - name: Build
        run: cmake --build ${{github.workspace}}/build-${{ runner.os }} --config Release --target caesium_image_compressor
      - name: Find windeployqt
        shell: pwsh
        run: |
          $paths = @(
            "$env:Qt6_Dir/bin/windeployqt.exe",
            "$env:Qt6_Dir/../Tools/mingw1310_64/bin/windeployqt.exe",
            "$env:RUNNER_WORKSPACE/Qt/6.8.2/mingw_64/bin/windeployqt.exe"
          )

          foreach ($p in $paths) {
            if (Test-Path $p) {
              echo "WINDEPLOYQT=$p" >> $env:GITHUB_ENV
              exit 0
            }
          }

          throw "windeployqt.exe not found"
   
      - name: Find exe
        shell: pwsh
        run: |
            Get-ChildItem build-${{ runner.os }} -Recurse *.exe | Select FullName
   


      - name: Deploy Qt
        shell: pwsh
        run: |
          mkdir package

          Copy-Item `
           "build-${{ runner.os }}/Caesium Image Compressor.exe" `
            package/
          & "$env:WINDEPLOYQT" `
            --release `
            --compiler-runtime `
             "package/Caesium Image Compressor.exe"
            
            

      - name: Copy MinGW Runtime
        shell: pwsh
        run: |
          $gcc = Split-Path (Get-Command g++.exe).Source

          Copy-Item "$gcc\libgcc_s_seh-1.dll" package/
          Copy-Item "$gcc\libstdc++-6.dll" package/
          Copy-Item "$gcc\libwinpthread-1.dll" package/
      - name: Create ZIP
        shell: pwsh
        run: |
          Compress-Archive `
            -Path package/* `
            -DestinationPath Caesium-Windows.zip
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Caesium-Windows
          path: Caesium-Windows.zip

      - name: Upload Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: Caesium-Windows.zip